name: Hugging Face Keep-Alive Ping
on:
  schedule:
    - cron: '*/30 * * * *' # التنفيذ كل نصف ساعة لضمان الاستيقاظ الدائم
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space Health Endpoint
        run: |
          # 🔥 التعديل هنا: الرابط الصحيح بالكامل مع https
          response=$(curl -s -o /dev/null -w "%{http_code}" https://abedgemma-abed-gemma4-chat-api.hf.space/health)
          if [ "$response" == "200" ]; then
            echo "Space is awake and healthy."
          else
            echo "Failed to wake up space. HTTP Code: $response"
            exit 1
          fi
